services:
  # ===========================================
  # Ollama - Local LLM inference server
  # ===========================================
  ollama:
    image: ollama/ollama:latest
    container_name: bob-the-agent-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          memory: 2G
        limits:
          memory: 8G

  # ===========================================
  # OpenClaw Agent - Main AI agent
  # ===========================================
  agent:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.agent
    container_name: bob-the-agent
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - XAI_API_KEY=${XAI_API_KEY}
    volumes:
      - ./volumes/results:${APP_BASE_PATH}/results:rw
      - ./volumes/user-files:${APP_BASE_PATH}/user-files:ro
      - ./volumes/data:${APP_BASE_PATH}/data:rw
      - agent_workspace:/app/workspace
    ports:
      - "18789:18789"  # OpenClaw gateway
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:18789/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # Web Interface - React dashboard with Node.js API
  # ===========================================
  web:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.web
    container_name: bob-the-agent-web
    restart: unless-stopped
    depends_on:
      agent:
        condition: service_healthy
    environment:
      - AGENT_API_URL=http://agent:18789
      - NODE_ENV=production
      - WEB_APP_BASE_PATH=${APP_BASE_PATH}
      - WEB_DATABASE_PATH=${WEB_DATABASE_PATH}
      - WEB_USERNAME=${WEB_USERNAME}
      - WEB_PASSWORD=${WEB_PASSWORD}
    volumes:
      - ./volumes/results:${APP_BASE_PATH}/results:ro
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# ===========================================
# Named Volumes
# ===========================================
volumes:
  ollama_data:
    driver: local
  agent_workspace:
    driver: local

# ===========================================
# Networks
# ===========================================
networks:
  default:
    name: bob-the-agent-network