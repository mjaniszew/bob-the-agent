services:
  # ===========================================
  # Ollama - Local LLM inference server
  # ===========================================
  ollama:
    image: ollama/ollama:latest
    container_name: bob-the-agent-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          memory: 1G

  # ===========================================
  # OpenClaw Agent - Main AI agent
  # ===========================================
  agent:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.agent
    container_name: bob-the-agent
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - X_COM_API_TOKEN=${X_COM_API_TOKEN}
      - XAI_SEARCH_API_KEY=${XAI_SEARCH_API_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_S3_REGION=${AWS_S3_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - ./volumes/results:${APP_BASE_PATH}/results:rw
      - ./volumes/user-files:${APP_BASE_PATH}/user-files:ro
      - ./volumes/data:${APP_BASE_PATH}/data:rw
      - agent_workspace:/app/workspace
    ports:
      - "18789:18789"  # OpenClaw gateway
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:18789/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          memory: 2G
        limits:
          memory: 4G

  # ===========================================
  # SearXNG - Privacy-respecting metasearch engine
  # ===========================================
  searxng:
    image: searxng/searxng:latest
    container_name: bob-the-agent-searxng
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      - SEARXNG_DEBUG=false
      - SEARXNG_BASE_URL=http://searxng:8888
      - SEARXNG_SECRET=123456789123456789123456798
      - SEARXNG_PUBLIC_INSTANCE=false
    volumes:
      - searxng_config:/etc/searxng/
      - searxng_data:/var/cache/searxng/
    ports:
      - "8888:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          memory: 512M
        limits:
          memory: 4G

  # ===========================================
  # Valkey - Redis-compatible cache for SearXNG
  # ===========================================
  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: bob-the-agent-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    command: valkey-server --save 30 1 --loglevel warning
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 256M

# ===========================================
# Named Volumes
# ===========================================
volumes:
  ollama_data:
    driver: local
  agent_workspace:
    driver: local
  searxng_config:
    driver: local
  searxng_data:
    driver: local
  valkey_data:
    driver: local

# ===========================================
# Networks
# ===========================================
networks:
  default:
    name: bob-the-agent-network