# ===========================================
# OpenClaw Agent Configuration
# ===========================================
# See: https://docs.openclaw.ai/configuration

agent:
  name: "MiniAgent"
  description: "Autonomous AI agent running 24/7 in Docker container"

  # Enable fully autonomous operation
  autonomous: true
  yolo: true  # Run without confirmation prompts

  # Heartbeat for scheduled task execution
  heartbeat:
    enabled: true
    interval: 60000  # Check for tasks every 60 seconds

  # Memory and context settings
  memory:
    type: "file"
    path: "/app/data/memory"

  # Workspace for file operations
  workspace:
    path: "/app/workspace"
    resultsPath: "/app/results"
    userFilesPath: "/app/user-files"

# ===========================================
# Model Providers
# ===========================================
providers:
  # Primary: Ollama (local)
  ollama:
    enabled: true
    baseUrl: "http://ollama:11434"
    defaultModel: "llama3.2"
    models:
      - name: "llama3.2"
        alias: "default"
        contextLength: 128000
      - name: "llama3.2:1b"
        alias: "fast"
        contextLength: 128000
      - name: "codellama"
        alias: "code"
        contextLength: 16000
    timeout: 120000  # 2 minutes
    retry:
      attempts: 3
      delay: 5000

  # Fallback: Cloud providers (configured via env)
  anthropic:
    enabled: false  # Enable via ANTHROPIC_API_KEY env
    defaultModel: "claude-sonnet-4-6"

  openai:
    enabled: false  # Enable via OPENAI_API_KEY env
    defaultModel: "gpt-4o"

# ===========================================
# Channels (Communication Interfaces)
# ===========================================
channels:
  # CLI - always enabled for SSH access
  cli:
    enabled: true

  # Discord bot (enable via DISCORD_BOT_TOKEN)
  discord:
    enabled: false
    prefix: "!"

  # Web interface
  webchat:
    enabled: true
    port: 18789

# ===========================================
# Skills Registry
# ===========================================
skills:
  # Built-in skills
  builtin:
    - "web-search"
    - "data-extraction"
    - "math-operations"
    - "document-creation"
    - "notifications"
    - "scheduling"

  # Custom skills directory
  customPath: "/app/config/skills"

# ===========================================
# Task Queue
# ===========================================
tasks:
  storage:
    type: "sqlite"
    path: "/app/data/tasks.db"

  scheduler:
    enabled: true
    type: "apscheduler"
    timezone: "UTC"

# ===========================================
# Logging
# ===========================================
logging:
  level: "${LOG_LEVEL:info}"
  format: "json"
  outputs:
    - type: "console"
    - type: "file"
      path: "/app/data/logs/agent.log"
      maxSize: "10MB"
      maxFiles: 5

# ===========================================
# Security
# ===========================================
security:
  # Sandbox settings for non-main sessions
  sandbox:
    mode: "off"  # Run on host for main session

  # Allowed tools (empty = all)
  allowedTools: []

  # Denied tools
  deniedTools: []

# ===========================================
# API Server (for Web Interface)
# ===========================================
api:
  enabled: true
  port: 3001
  host: "0.0.0.0"

  # CORS settings
  cors:
    origins: "${ALLOWED_ORIGINS:http://localhost:81234}"
    credentials: true

  # Authentication
  auth:
    type: "jwt"
    secret: "${SESSION_SECRET}"
    expiration: "${JWT_EXPIRATION:86400}"